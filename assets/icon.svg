<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="main_bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/> <!-- Indigo 500 -->
      <stop offset="1" stop-color="#312E81"/> <!-- Indigo 900 -->
    </linearGradient>
    
    <filter id="elevate" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="30" stdDeviation="50" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <linearGradient id="glass_top" x1="512" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.2"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base Superellipse (approx) -->
  <rect width="1024" height="1024" rx="286" fill="url(#main_bg)" />
  
  <!-- Subtle Grid Texture -->
  <path d="M0 256H1024M0 512H1024M0 768H1024M256 0V1024M512 0V1024M768 0V1024" stroke="white" stroke-opacity="0.05" stroke-width="2" />

  <!-- Logo Group -->
  <g filter="url(#elevate)">
    <!-- Shield / Foundation -->
    <path d="M512 220C512 220 780 300 780 500C780 720 512 840 512 840C512 840 244 720 244 500C244 300 512 220 512 220Z" fill="white" fill-opacity="0.1" stroke="white" stroke-width="40" />
    
    <!-- Bold Hospital Cross -->
    <path d="M512 360V640M372 500H652" stroke="white" stroke-width="110" stroke-linecap="round" />
    
    <!-- Small Accent Star/Dot -->
    <circle cx="700" cy="350" r="50" fill="#F43F5E" stroke="white" stroke-width="15" />
  </g>

  <!-- Glassy Top Highlight -->
  <rect width="1024" height="512" rx="286" fill="url(#glass_top)" />
  
  <!-- Inner Bevel -->
  <rect x="25" y="25" width="974" height="974" rx="271" stroke="white" stroke-opacity="0.15" stroke-width="10" fill="none" />
</svg>
